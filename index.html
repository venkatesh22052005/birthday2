<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday  🎂</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    text-align: center;
    background: black;
    color: white;
    overflow: hidden;
    position: relative;
}

h1 {
    margin-top: 30px;
    color: gold;
}

/* Button */
button {
    padding: 15px 30px;
    font-size: 18px;
    border-radius: 20px;
    border: none;
    background: #ff4081;
    color: white;
    cursor: pointer;
}

input {
  padding: 10px;
  border-radius: 10px;
  border: none;
  margin: 10px;
}


/* Message */
#message {
    margin-top: 20px;
    font-size: 22px;
    min-height: 60px;
}

/* Slideshow */
.slideshow-container {
    max-width: 300px;
    margin: 20px auto;
}

.slide {
    display: none;
}

.slide img {
    width: 100%;
    border-radius: 15px;
}

.fade {
    animation: fade 1.5s;
}

/* Loader */
  #loader {
    height: 80vh;
    display: none;
    justify-content: center;
    align-items: center;
    font-size: 80px;
    color: gold;
    animation: fadeIn 1s ease-in-out;
  }




/* Dots */
.dot {
    height: 10px;
    width: 10px;
    margin: 5px;
    background: gray;
    border-radius: 50%;
    display: inline-block;
}

.active {
    background: pink;
}



/* Canvas */
canvas {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -1;
    pointer-events: none;
}

/* Animations */
  @keyframes fadeIn {
    from {opacity: 0;}
    to {opacity: 1;}
  }

  @keyframes zoomIn {
    from {transform: scale(0);}
    to {transform: scale(1);}
  }
</style>
</head>

<body>
    <!-- Lock Screen -->
<div id="lockScreen">
  <h1>Enter Your Name 💖</h1>
  <input type="text" id="nameInput" placeholder="Enter name" autofocus>
  <button type="button" onclick="unlock()"> Enter</button>
  <div id="status" style="color: #ffb6c1; margin-top: 10px; font-size: 16px;"></div>
</div>

<h1>🎉 Happy Birthday My Lovely Sister 🎉</h1>

<button onclick="startSurprise()" aria-label="Start birthday surprise">Click for Surprise 🎁</button>

<!-- Loader -->
<div id="loader">
  <h1 id="count"></h1>
</div>



<div id="message"></div>

<!-- Slideshow -->
<div class="slideshow-container">
    <div class="slide fade"><img src="IMG_20260221_212725.jpg" alt="Birthday memory 1"></div>
    <div class="slide fade"><img src="1000069489-01.jpeg" alt="Birthday memory 2"></div>
    <div class="slide fade"><img src="388A0035-01.jpeg" alt="Birthday memory 3"></div>
</div>

<!-- Dots -->
<div>
    <span class="dot"></span>
    <span class="dot"></span>
    <span class="dot"></span>
</div>

<!-- Music -->
<audio id="music" src="dooron.mp3"></audio>

<!-- Fireworks -->
<canvas id="canvas"></canvas>

<script>
// START EVERYTHING

function startSurprise() {
    const name = document.getElementById("nameInput").value.trim();
    const statusEl = document.getElementById("status");
    statusEl.innerText = "";

    if (name === "") {
        window.alert("Enter name first!");
        statusEl.innerText = "Please type the correct name to unlock the surprise.";
        return;
    }
    if (name.toLowerCase() !== "minnu") {
        window.alert("Incorrect name. Please enter 'minnu' to unlock the surprise.");
        statusEl.innerText = "Wrong name entered. Try again with 'minnu'.";
        return;
    }

    statusEl.innerText = "";
    document.getElementById("lockScreen").style.display = "none";
    document.getElementById("loader").style.display = "flex";

    startCountdown();
    typeMessage();
    showSlides();

    const audio = document.getElementById("music");
    audio.play().catch(() => console.log('Audio failed to load or play'));
    startFireworks();
}

function unlock() {
    startSurprise();
}

function startCountdown() {
    let count = 6;
    const countEl = document.getElementById("count");
    countEl.innerText = count;

    const interval = setInterval(() => {
        count--;
        countEl.innerText = count;
        if (count === 0) {
            clearInterval(interval);
            document.getElementById("loader").style.display = "none";
        }
    }, 1000);
}

// TYPING MESSAGE
let text = "💖 You are the best sister in the world! May your life be full of happiness, success and love. I love you so much ❤️";
let i = 0;

function typeMessage() {
    let speed = 150;
    if (i < text.length) {
        document.getElementById("message").innerHTML += text.charAt(i);
        i++;
        setTimeout(typeMessage, speed);
    }
}

// SLIDESHOW
let slideIndex = 0;

function showSlides() {
    let slides = document.getElementsByClassName("slide");
    let dots = document.getElementsByClassName("dot");

    if (slides.length === 0) return;  // Guard for no slides

    for (let i = 0; i < slides.length; i++) {
        slides[i].style.display = "none";
    }

    slideIndex++;
    if (slideIndex > slides.length) { slideIndex = 1 }

    for (let i = 0; i < dots.length; i++) {
        dots[i].className = dots[i].className.replace(" active", "");
    }

    slides[slideIndex-1].style.display = "block";
    dots[slideIndex-1].className += " active";

    setTimeout(showSlides, 5000);
}

function startFireworks() {
    const canvas = document.getElementById("canvas");
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    if (!ctx) return;

    let width = window.innerWidth;
    let height = window.innerHeight;
    canvas.width = width;
    canvas.height = height;
    canvas.style.zIndex = "-1";
    canvas.style.pointerEvents = "none";

    window.addEventListener("resize", () => {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
    });

    const rockets = [];
    const particles = [];

    function createRocket() {
        rockets.push({
            x: Math.random() * width,
            y: height,
            vx: (Math.random() - 0.5) * 2,
            vy: -(6 + Math.random() * 4),
            color: Math.random() * 360
        });
    }

    function explode(x, y, color) {
        const count = 40;
        for (let i = 0; i < count; i++) {
            const angle = Math.random() * Math.PI * 2;
            const speed = Math.random() * 3 + 1;
            particles.push({
                x,
                y,
                vx: Math.cos(angle) * speed,
                vy: Math.sin(angle) * speed,
                life: 50 + Math.random() * 30,
                age: 0,
                color
            });
        }
    }

    function update() {
        ctx.fillStyle = "rgba(0, 0, 0, 0.15)";
        ctx.fillRect(0, 0, width, height);

        if (Math.random() < 0.08) {
            createRocket();
        }

        for (let i = rockets.length - 1; i >= 0; i--) {
            const rocket = rockets[i];
            rocket.x += rocket.vx;
            rocket.y += rocket.vy;
            rocket.vy += 0.08;
            ctx.fillStyle = `hsl(${rocket.color}, 100%, 70%)`;
            ctx.beginPath();
            ctx.arc(rocket.x, rocket.y, 3, 0, Math.PI * 2);
            ctx.fill();

            if (rocket.vy >= 0 || rocket.y < height * 0.3) {
                explode(rocket.x, rocket.y, rocket.color);
                rockets.splice(i, 1);
            }
        }

        for (let i = particles.length - 1; i >= 0; i--) {
            const particle = particles[i];
            particle.x += particle.vx;
            particle.y += particle.vy;
            particle.vy += 0.02;
            particle.age += 1;
            const alpha = 1 - particle.age / particle.life;
            if (alpha <= 0) {
                particles.splice(i, 1);
                continue;
            }
            ctx.fillStyle = `hsla(${particle.color}, 100%, 70%, ${alpha})`;
            ctx.fillRect(particle.x, particle.y, 2, 2);
        }

        requestAnimationFrame(update);
    }

    update();
}

document.getElementById("nameInput").addEventListener("keydown", function(event) {
    if (event.key === "Enter") {
        startSurprise();
    }
});

</script>

</body>
</html>
